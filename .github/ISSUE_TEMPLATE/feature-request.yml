name: 功能建议
description: 提出新功能或改进想法
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰地描述你想要的功能
      placeholder: 例如：希望插件系统支持自定义 Widget 类型...
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 什么情况下你会用到这个功能？
      placeholder: 例如：我在用 Claude Code 做项目时，希望能实时看到 token 消耗...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他实现方式？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 你觉得这个功能有多重要？
      options:
        - 锦上添花
        - 有就好
        - 很需要
        - 非常需要
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 当前版本
      description: 你使用的版本号
      placeholder: 例如：1.5.5
